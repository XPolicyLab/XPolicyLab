policy_name: Dexora_1B
protocol: ws
bench_name: null
task_name: null
env_cfg_type: null
seed: null
eval_batch: false

# XPolicyLab model server
host: localhost
port: 6000

# Dexora runtime. Absolute paths are left null: set DEXORA_ROOT / DEXORA_CKPT_PATH
# (and optionally config_path / stats_file / HF_HOME) via env or wrapper args.
dexora_root: null
checkpoint_path: null
config_path: null
stats_file: null
text_encoder_path: google/t5-v1_1-xxl
vision_encoder_path: google/siglip-so400m-patch14-384
hf_home: null
hf_hub_cache: null
hf_offline: true
local_files_only: false

# Robot/action settings. Default fallback is dual-arm [6 + gripper] x 2 = 14.
action_type: joint
allow_default_robot_dims: true
robot_action_dim_info: null
ctrl_freq: 25
prompt: null
input_color_order: rgb
clip_normalized_actions: true
device: cuda
dtype: bfloat16
strict_load: true
