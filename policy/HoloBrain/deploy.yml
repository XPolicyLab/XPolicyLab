policy_name: HoloBrain
dataset_name: null
task_name: null
env_cfg_type: null
expert_data_num: null
action_type: null
gpu_id: null
seed: null

# Exported pipeline directory (<workspace>/model from export.sh).
# Leave null: setup_eval_policy_server.sh resolves from
# workspace/<dataset>-<ckpt_name>-<env>-<num>-<action>-<seed>/model
# using eval.sh ckpt_name (legacy -seed<N> workspace names also supported).
model_dir: null
ckpt_name: null

# Inference config prefix; export.py writes one <prefix>.config.json per
# entry in deploy_datasets. For the XPolicyLab arx_x5 flow this is
# "robotwin2_0" (matches XPOLICY_HOLOBRAIN_DATASETS used during training).
inference_prefix: robotwin2_0

action_chunk_size: 16

# Evaluation mode: debug uses debug_env_client.py with mock observations.
# Switch to "sim" or "real" for simulator / real-robot deployment.
eval_env: debug
eval_batch: false
