# @package _global_
# G0Plus_3B joint fine-tune on XPolicyLab-converted LeRobot v3 datasets
# (head_rgb / left_wrist_rgb / right_wrist_rgb, per-key state/action columns).

defaults:
  - override /data: xpolicylab/dual_arm_joint
  - override /model: vla/g0plus

model:
  pretrained_ckpt: checkpoints/G0Plus_3B_base/checkpoints
  use_pretrained_norm_stats: False

data:
  dataset:
    lerobot_ds_version: "3.0"
    dataset_dirs: null
