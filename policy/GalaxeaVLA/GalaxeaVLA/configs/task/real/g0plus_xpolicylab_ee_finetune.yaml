# @package _global_
# G0Plus_3B end-effector (ee) fine-tune on the pre-converted RoboDojo arx-x5
# LeRobot v2.1 dataset (RoboDojo_sim_arx-x5_v21_video). Uses the flat 30-dim
# state/action sliced into left/right EE pose + grippers, matching the
# pretrained G0Plus ee action head. Override pretrained_ckpt / dataset_dirs as needed.

defaults:
  - override /data: xpolicylab/dual_arm_ee
  - override /model: vla/g0plus

model:
  pretrained_ckpt: checkpoints/G0Plus_3B_base/checkpoints
  # Recompute normalization stats from THIS dataset (RoboDojo ee distribution
  # differs from G0Plus pretraining); mirrors configs/task/libero/g0plus.yaml.
  use_pretrained_norm_stats: False

data:
  dataset:
    dataset_dirs:
      - /mnt/xspark-data/xspark_shared/lerobot/RoboDojo_sim_arx-x5_v21_video
