# @package _global_
# G0Plus_3B joint fine-tune on RoboDojo_sim_arx-x5_v30 (LeRobot v3.0, 14-dim
# dual-arm joint, 3 cameras). Override pretrained_ckpt / dataset_dirs as needed.

defaults:
  - override /data: xpolicylab/dual_arm_joint_robodojo
  - override /model: vla/g0plus

model:
  pretrained_ckpt: checkpoints/G0Plus_3B_base/checkpoints
  use_pretrained_norm_stats: False

data:
  dataset:
    dataset_dirs:
      - /mnt/xspark-data/xspark_shared/lerobot/RoboDojo_sim_arx-x5_v30
