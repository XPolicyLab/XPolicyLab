dataset:
  _target_: galaxea_fm.data.galaxea_lerobot_dataset.GalaxeaLerobotDataset

  # Read-only original RoboDojo arx-x5 LeRobot v2.1 dataset. The flat 30-dim
  # observation.state / action columns are sliced per-key below (see `slice`),
  # so no data copy / re-split is needed. Override dataset_dirs on the CLI if
  # the path differs.
  dataset_dirs:
    - /mnt/xspark-data/xspark_shared/lerobot/RoboDojo_sim_arx-x5_v21_video

  # v2.1 meta layout (episodes.jsonl / tasks.jsonl). av1 videos require pyav
  # (torchcodec cannot decode av1 in this env).
  lerobot_ds_version: "2.1"
  video_backend: pyav

  # Flat 30-dim layout (info.json names):
  #   [0:7]   left  EEF pose  (x,y,z, qx,qy,qz,qw)  scalar-last quaternion
  #   [7:14]  right EEF pose
  #   [14:21] left  joint_0..6   (unused in EEF mode)
  #   [21:28] right joint_0..6   (unused in EEF mode)
  #   [28]    left  gripper      (range ~[0,1])
  #   [29]    right gripper
  shape_meta:
    action:
      - key: left_ee_pose
        lerobot_key: action
        slice: [0, 7]
        raw_shape: 7
        shape: 9
      - key: left_gripper
        lerobot_key: action
        slice: [28, 29]
        raw_shape: 1
        shape: 1
      - key: right_ee_pose
        lerobot_key: action
        slice: [7, 14]
        raw_shape: 7
        shape: 9
      - key: right_gripper
        lerobot_key: action
        slice: [29, 30]
        raw_shape: 1
        shape: 1

    state:
      - key: left_ee_pose
        lerobot_key: observation.state
        slice: [0, 7]
        raw_shape: 7
        shape: 9
      - key: left_gripper
        lerobot_key: observation.state
        slice: [28, 29]
        raw_shape: 1
        shape: 1
      - key: right_ee_pose
        lerobot_key: observation.state
        slice: [7, 14]
        raw_shape: 7
        shape: 9
      - key: right_gripper
        lerobot_key: observation.state
        slice: [29, 30]
        raw_shape: 1
        shape: 1

    images:
      - key: cam_high
        raw_shape:
          - 3
          - 256
          - 256
        shape:
          - 3
          - ${model.model_meta.input_image_size.0}
          - ${model.model_meta.input_image_size.1}
      - key: cam_left_wrist
        raw_shape:
          - 3
          - 256
          - 256
        shape:
          - 3
          - ${model.model_meta.input_image_size.0}
          - ${model.model_meta.input_image_size.1}
      - key: cam_right_wrist
        raw_shape:
          - 3
          - 256
          - 256
        shape:
          - 3
          - ${model.model_meta.input_image_size.0}
          - ${model.model_meta.input_image_size.1}

  action_size: 32
  past_action_size: 0
  obs_size: 1
  ee_start_moving_thresh: 0.002
  val_set_proportion: 0.05


processor:
  _target_: galaxea_fm.processors.base_processor.BaseProcessor

  shape_meta: ${data.dataset.shape_meta}
  num_obs_steps: ${data.dataset.obs_size}
  num_output_cameras: 3
  action_output_dim: ${sum_shapes:${data.dataset.shape_meta.action}}
  proprio_output_dim: ${sum_shapes:${data.dataset.shape_meta.state}}

  action_state_transforms:
    - _target_: galaxea_fm.transforms.relative_action.RelativePoseTransform
      keys: [left_ee_pose, right_ee_pose]
    - _target_: galaxea_fm.transforms.rotation.PoseRotationTransform
      rotation_type: rotation_6d
      category_keys:
        action: [left_ee_pose, right_ee_pose]
        state: [left_ee_pose, right_ee_pose]

  # action & state normalization
  use_stepwise_action_norm: True
  norm_default_mode: ${model.model_meta.norm_default_mode}
  norm_exception_mode:
    action:
      left_gripper: "0/1"
      right_gripper: "0/1"

  action_state_merger:
    _target_: galaxea_fm.transforms.action_state_merger.ConcatLeftAlign

  # image transform
  train_transforms:
    cam_high:
      - _target_: torchvision.transforms.Resize
        size: ${model.model_meta.input_image_size}
      - _target_: galaxea_fm.transforms.image.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean: [0.5, 0.5, 0.5]
        std: [0.5, 0.5, 0.5]
    cam_left_wrist: ${data.processor.train_transforms.cam_high}
    cam_right_wrist: ${data.processor.train_transforms.cam_high}

  val_transforms:
    cam_high:
      - _target_: torchvision.transforms.Resize
        size: ${model.model_meta.input_image_size}
      - _target_: galaxea_fm.transforms.image.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean: [0.5, 0.5, 0.5]
        std: [0.5, 0.5, 0.5]
    cam_left_wrist: ${data.processor.val_transforms.cam_high}
    cam_right_wrist: ${data.processor.val_transforms.cam_high}

  # instruction
  drop_high_level_prob: 1.0
  use_zh_instruction: False

  tokenizer: ${model.tokenizer}
