# Basic experiment configuration
policy_name: Motus
task_name: null
ckpt_name: null
bench_name: null
env_cfg_type: null
action_type: joint
seed: 0
eval_batch: false
protocol: ws
host: localhost
port: null

# Motus-specific arguments
ckpt_setting: null
checkpoint_path: null
model_path: null
prompt: null
# Normalization embodiment; MUST match the embodiment used at training time
# (the RoboDojo checkpoint was trained with embodiment_type: aloha_agilex_2).
embodiment_type: aloha_agilex_2
# wan_path / vlm_path left null: set them here or via MOTUS_WAN_PATH / MOTUS_VLM_PATH.
wan_path: null
vlm_path: null
# Relative to the policy dir (policy/Motus/).
log_dir: logs/motus_debug
global_downsample_rate: 1
video_action_freq_ratio: 6
# RoboDojo checkpoint uses LeRobot raw task strings for T5/VLM (no scene prefix).
use_scene_prefix: false
# Optional T5 cache; null disables it (task strings are encoded on the fly).
t5_cache_dir: null
